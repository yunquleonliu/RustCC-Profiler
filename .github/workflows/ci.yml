name: Rust C/C++ CI / Rust C/C++ 持续集成
# Continuous integration for Rust C/C++ Profiler
# Rust C/C++ 分析器的持续集成

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Test (Linux) / 构建与测试（Linux）
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code / 检出代码
      uses: actions/checkout@v4
    
    - name: Install build dependencies / 安装构建依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake ninja-build build-essential \
          clang-14 llvm-14-dev libclang-14-dev
    
    - name: Configure CMake / 配置 CMake
      run: |
        cmake -S . -B build-linux -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DLLVM_DIR=/usr/lib/llvm-14/lib/cmake/llvm \
          -DClang_DIR=/usr/lib/llvm-14/lib/cmake/clang \
          -DRCC_BUILD_TESTS=ON \
          -DRCC_BUILD_EXAMPLES=ON
    
    - name: Build / 构建
      run: cmake --build build-linux --config Release
    
    - name: Run tests / 运行测试
      run: ctest --test-dir build-linux --output-on-failure -C Release
    
    - name: Upload artifacts / 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: rcc-check-ubuntu-22.04-llvm14
        path: build-linux/src/rcc-check*

